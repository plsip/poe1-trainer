services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: poe
      POSTGRES_PASSWORD: poe
      POSTGRES_DB: poetrainer
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U poe -d poetrainer"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: "postgres://poe:poe@db:5432/poetrainer?sslmode=disable"
      PORT: "8080"
      # LOG_PATH przekazywany z hosta (.env lub shell).
      # Zostaw puste aby wyłączyć obserwację loga — aplikacja działa bez tego.
      LOG_PATH: "${LOG_PATH:-}"
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: poe
      POSTGRES_PASSWORD: poe
      POSTGRES_DB: poetrainer
    ports:
      - "5432:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U poe -d poetrainer"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    environment:
      DATABASE_URL: "postgres://poe:poe@db:5432/poetrainer?sslmode=disable"
      PORT: "8080"
      # LOG_PATH przekazywany z hosta (.env lub shell).
      # Zostaw puste aby wyłączyć obserwację loga — aplikacja działa bez tego.
      LOG_PATH: "${LOG_PATH:-}"
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app
      - go_pkg:/go/pkg/mod
      - go_build_cache:/root/.cache/go-build
      # Montuje katalog logów gry z hosta jako read-only.
      # POE_LOG_DIR musi wskazywać na katalog zawierający Client.txt.
      # Zostaw nieustawione jeśli nie chcesz obserwować pliku logów.
      - ${POE_LOG_DIR:-./tmp/poe-logs}:/mnt/poe-logs:ro
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    environment:
      BACKEND_URL: "http://backend:8080"
    ports:
      - "3000:3000"
      - "24678:24678"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

  # Jednorazowy import przewodnika do bazy danych.
  # Uruchom: docker compose -f docker-compose.dev.yml --profile seed up seed
  seed:
    profiles: [seed]
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    environment:
      DATABASE_URL: "postgres://poe:poe@db:5432/poetrainer?sslmode=disable"
    volumes:
      - ./backend:/app
      - ./.git:/app/.git:ro
      - ./guides:/guides:ro
      - go_pkg:/go/pkg/mod
      - go_build_cache:/root/.cache/go-build
    depends_on:
      db:
        condition: service_healthy
    command:
      - go
      - run
      - ./cmd/import
      - -file=/guides/stormburst_campaign.md
      - -slug=stormburst_campaign_v1
      - -title=Stormburst Totemy — Kampania
      - -build=Storm Burst Totemy
    restart: "no"

volumes:
  pgdata_dev:
  go_pkg:
  go_build_cache:
  frontend_node_modules:

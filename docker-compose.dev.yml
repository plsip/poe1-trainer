services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: poe
      POSTGRES_PASSWORD: poe
      POSTGRES_DB: poetrainer
    ports:
      - "5432:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U poe -d poetrainer"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    environment:
      DATABASE_URL: "postgres://poe:poe@db:5432/poetrainer?sslmode=disable"
      PORT: "8080"
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app
      - go_pkg:/go/pkg/mod
      - go_build_cache:/root/.cache/go-build
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    environment:
      BACKEND_URL: "http://backend:8080"
    ports:
      - "3000:3000"
      - "24678:24678"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

volumes:
  pgdata_dev:
  go_pkg:
  go_build_cache:
  frontend_node_modules:
